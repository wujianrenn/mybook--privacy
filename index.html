  <h1>《麦芽糖的记账本》隐私政策</h1>
  <p>生效日期：2026-04-07</p>

  <h2>1. 数据存储</h2>
  <p>本应用默认在本地设备存储账单与附件数据。</p>

  <h2>2. 权限使用</h2>
  <p>相机/相册权限仅用于用户主动添加票据附件。</p>

  <h2>3. 数据收集与跟踪</h2>
  <p>当前版本不提供账号体系，不进行个性化广告跟踪，不将用户账单数据上传至开发者服务器。</p>

  <h2>4. 用户控制</h2>
  <p>用户可通过删除记录或卸载应用移除本地数据。</p>

  <h2>5. 功能变更说明</h2>
  <p>如后续功能涉及云端同步或在线识别，我们将在版本更新中另行说明并征求授权。</p>

  <h2>6. 联系方式</h2>
  <p>联系邮箱：你的邮箱@example.com</p>
